<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI JD Extractor | Professional Data Pipeline</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="glass-container">
        <header>
            <h1>AI JD Extractor</h1>
            <p class="subtitle">Extract structured datasets from unstructured job descriptions with precision.</p>
        </header>

        <main>
            <!-- Upload Section -->
            <section id="upload-section">
                <div class="upload-region" id="drop-zone">
                    <input type="file" id="file-input" accept=".pdf" style="display: none;">
                    <div class="upload-icon"></div>
                    <h3>Upload Job Description PDF</h3>
                    <p class="text-muted">Drag & drop or click to select file</p>
                </div>
            </section>

            <!-- Results Section (Hidden initially) -->
            <section id="results-section" class="main-grid">
                <!-- Left Column: Core Info -->
                <div class="card" id="core-info">
                    <h2>Position Details</h2>
                    
                    <div class="field-group">
                        <label class="label">Job Title</label>
                        <input type="text" id="job-title" class="value-input">
                    </div>

                    <div class="field-group">
                        <label class="label">Company Name</label>
                        <input type="text" id="company-name" class="value-input">
                    </div>

                    <div class="field-group">
                        <label class="label">Location</label>
                        <input type="text" id="location" class="value-input">
                    </div>

                    <div class="field-group">
                        <label class="label">Experience Level</label>
                        <input type="text" id="experience-level" class="value-input">
                    </div>

                    <div class="field-group">
                        <label class="label">Compensation</label>
                        <input type="text" id="compensation" class="value-input">
                    </div>

                    <div class="field-group">
                        <label class="label">Extraction Confidence</label>
                        <div class="confidence-meter">
                            <div id="confidence-fill" class="confidence-fill"></div>
                        </div>
                    </div>
                </div>

                <!-- Right Column: Skills & Responsibilities -->
                <div class="card" id="detail-info">
                    <h2>Requirements & Tasks</h2>

                    <div class="field-group">
                        <label class="label">Must-Have Skills (Comma Separated)</label>
                        <textarea id="must-have-skills" class="value-input" rows="3"></textarea>
                    </div>

                    <div class="field-group">
                        <label class="label">Bonus Points (Comma Separated)</label>
                        <textarea id="bonus-points" class="value-input" rows="3"></textarea>
                    </div>

                    <div class="field-group">
                        <label class="label">Key Responsibilities (JSON List)</label>
                        <textarea id="responsibilities" class="value-input" rows="4"></textarea>
                    </div>

                    <div class="field-group">
                        <label class="label">Contact Emails</label>
                        <div id="email-tags" class="tag-list"></div>
                    </div>
                </div>

                <div style="grid-column: 1 / -1; display: flex; gap: 1rem; justify-content: flex-end;">
                  <button class="btn btn-outline" onclick="resetUI()">Cancel</button>
                  <button class="btn btn-primary" onclick="exportCSV()">Export to CSV</button>
                </div>
            </section>
        </main>
    </div>

    <!-- Loader -->
    <div class="loader-overlay" id="loader">
        <div style="text-align: center;">
            <div class="spinner"></div>
            <p style="margin-top: 1rem; font-weight: 600;">Processing PDF with AI...</p>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
